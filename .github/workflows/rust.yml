name: Rust CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  licenses:
    name: License Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny check licenses

  format:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Setup LLVM (Linux)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21"

      - name: Configure LLVM env (Linux)
        shell: bash
        run: |
          echo "LLVM_SYS_211_PREFIX=${LLVM_PATH}" >> "$GITHUB_ENV"
          echo "PATH=${LLVM_PATH}/bin:$PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${LLVM_PATH}/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Verify llvm-config
        shell: bash
        run: |
          which llvm-config
          llvm-config --version

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

  test:
    name: Test (${{ matrix.os }} / ${{ matrix.rust }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
        include:
          - os: ubuntu-latest
            rust: beta
          - os: ubuntu-latest
            rust: nightly

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # Linux/macOS: rustup toolchain
      # -------------------------
      - name: Setup Rust (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}

      - name: Setup LLVM (Linux/macOS)
        if: runner.os != 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21"

      - name: Configure LLVM env (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "LLVM_SYS_211_PREFIX=${LLVM_PATH}" >> "$GITHUB_ENV"
          echo "PATH=${LLVM_PATH}/bin:$PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${LLVM_PATH}/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=${LLVM_PATH}/lib" >> "$GITHUB_ENV"

      - name: Configure LLVM env (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"

          echo "LLVM_SYS_211_PREFIX=${LLVM_PATH}" >> "$GITHUB_ENV"
          echo "PATH=${LLVM_PATH}/bin:$PATH" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=${LLVM_PATH}/lib" >> "$GITHUB_ENV"

          # Keep toolchain consistent (avoid Apple LTO mismatch)
          echo "CC=${LLVM_PATH}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PATH}/bin/clang++" >> "$GITHUB_ENV"
          echo "AR=${LLVM_PATH}/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER=${LLVM_PATH}/bin/clang" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=-D warnings -C link-arg=-fuse-ld=lld -C link-arg=-lc++ -C link-arg=-lc++abi" >> "$GITHUB_ENV"

          # Fix headers from SDK (inttypes.h etc.)
          echo "SDKROOT=${SDKROOT}" >> "$GITHUB_ENV"
          echo "CFLAGS=-isysroot ${SDKROOT}" >> "$GITHUB_ENV"
          echo "CXXFLAGS=-isysroot ${SDKROOT}" >> "$GITHUB_ENV"

          # IMPORTANT: avoid “built for 14.0, linked for 11.0”
          echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> "$GITHUB_ENV"

      - name: Verify llvm-config (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          which llvm-config
          llvm-config --version
          "${LLVM_PATH}/bin/clang" --version

      # -------------------------
      # Windows: MSYS2 toolchain ONLY (no rustup)
      # -------------------------
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # Critical: don't inherit the runner PATH (prevents accidentally using rustup/cargo from Windows)
          path-type: minimal
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-libffi
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-libxml2

      - name: Configure LLVM env (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          echo "LLVM_SYS_211_PREFIX=/mingw64" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=/mingw64/bin" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/mingw64/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Verify toolchain (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          which gcc
          gcc --version
          which rustc
          rustc --version
          which cargo
          cargo --version
          which llvm-config
          llvm-config --version

      # -------------------------
      # Build + test
      # -------------------------

      - name: Build (Debug) (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cargo build --verbose --workspace --all-features

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cargo test --verbose --workspace --all-targets --all-features

      - name: Build (Release) (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cargo build --release --verbose --workspace --all-features

      - name: Run tests (Release) (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cargo test --release --verbose --workspace --all-targets --all-features

      - name: Build (Debug)
        if: runner.os != 'Windows'
        run: cargo build --verbose --workspace --all-features

      - name: Run tests
        if: runner.os != 'Windows'
        run: cargo test --verbose --workspace --all-targets --all-features

      - name: Build (Release)
        if: runner.os != 'Windows'
        run: cargo build --release --verbose --workspace --all-features

      - name: Run tests (Release)
        if: runner.os != 'Windows'
        run: cargo test --release --verbose --workspace --all-targets --all-features

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup LLVM (Linux)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21"

      - name: Configure LLVM env (Linux)
        shell: bash
        run: |
          echo "LLVM_SYS_211_PREFIX=${LLVM_PATH}" >> "$GITHUB_ENV"
          echo "PATH=${LLVM_PATH}/bin:$PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${LLVM_PATH}/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Verify llvm-config
        shell: bash
        run: |
          which llvm-config
          llvm-config --version

      - name: Build documentation
        run: cargo doc --no-deps --workspace --all-features
        env:
          RUSTDOCFLAGS: -D warnings